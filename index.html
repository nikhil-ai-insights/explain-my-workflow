<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explain My Workflow - n8n Documentation AI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="fade-in">
            <h1 class="neon-text">Explain My Workflow</h1>
            <p class="tagline">AI-powered documentation for your n8n automations.</p>
        </header>

        <main>
            <section id="upload-section" class="card fade-in">
                <div class="upload-area" id="drop-zone">
                    <input type="file" id="file-input" accept=".json" hidden>
                    <div class="upload-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="17 8 12 3 7 8"></polyline>
                            <line x1="12" y1="3" x2="12" y2="15"></line>
                        </svg>
                    </div>
                    <h2>Upload Workflow JSON</h2>
                    <p>Drag and drop your n8n export file here or click to browse</p>
                    <button class="btn-neon" id="browse-btn">Select File</button>
                </div>
            </section>

            <section id="result-section" class="hidden">
                <div class="workflow-header card fade-in">
                    <div class="workflow-info">
                        <h2 id="wf-name">Workflow Name</h2>
                        <div class="stats">
                            <span class="stat-item"><strong id="node-count">0</strong> Nodes</span>
                            <span class="stat-item" id="wf-trigger">Trigger: Manual</span>
                        </div>
                    </div>
                </div>

                <div id="guide-container" class="guide-content fade-in">
                    <!-- Steps will be injected here -->
                </div>

                <div class="actions fade-in">
                    <button class="btn-neon" id="copy-btn">Copy Full Guide</button>
                    <button class="btn-outline" id="reset-btn">Upload Another</button>
                </div>
            </section>
        </main>

        <footer class="fade-in">
            <p>&copy; 2026 Explain My Workflow. Local JSON parsing only.</p>
        </footer>
    </div>

    <!-- Error Toast -->
    <div id="toast" class="toast hidden"></div>

    <script src="app.js"></script>
</body>
</html>
